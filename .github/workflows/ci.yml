name: Continuous Integration

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-prelude:
    name: Unit Tests + Docker Build
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Go unit tests + Docker build and push to local registry
        id: ci
        uses: somaz94/go-docker-action-ci-action@v1
        with:
          coverage_threshold: '85'
          manage_registry: 'false'

      - name: Run the Container (dry-run)
        run: |
          docker run \
            --env INPUT_TAG="v1.0.0" \
            --env INPUT_MAJOR_ONLY="true" \
            --rm "${{ steps.ci.outputs.image_ref }}" 2>&1 || true

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    needs: ci-prelude
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run binary directly (dry validation)
        run: |
          go build -o major-tag-action ./cmd/main.go
          INPUT_TAG="v1.2.3" INPUT_MAJOR_ONLY="true" ./major-tag-action 2>&1 || true

  ci-result:
    name: CI Result
    if: always()
    needs:
      - ci-prelude
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
